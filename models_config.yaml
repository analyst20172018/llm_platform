parameter_templates:
  web_search: &param_web_search
    type: boolean
    default: false
    ui: toggle
    label: Web Search
  code_execution: &param_code_execution
    type: boolean
    default: false
    ui: toggle
    label: Code Execution
  citations_enabled: &param_citations_enabled
    type: boolean
    default: false
    ui: toggle
    label: Citations Enabled
  url_context: &param_url_context
    type: boolean
    default: false
    ui: toggle
    label: URL Context
  function_calling: &param_function_calling
    type: boolean
    default: true
    ui: hidden
    send_default: false
    include_in_request: false
  structured_output: &param_structured_output
    type: boolean
    default: true
    ui: hidden
    send_default: false
  temperature_fixed_1: &param_temperature_fixed_1
    type: float
    default: 1
    ui: hidden
  max_tokens: &param_max_tokens
    type: integer
    ui: hidden
  max_tokens_as_max_output: &param_max_output_tokens
    type: integer
    ui: hidden
    request_key: max_output_tokens

models:
  - name: claude-sonnet-4-6
    display_name: Claude Sonnet 4.6 👍
    adapter: AnthropicAdapter
    pricing:
      input: 3 # USD/1M tokens
      output: 15 # USD/1M tokens
    context_window: 1_000_000
    inputs:
      - image
      - text
    outputs:
      - text
    additional_parameters:
      max_tokens:
        <<: *param_max_tokens
        default: 64000
      web_search: *param_web_search
      code_execution: *param_code_execution
      citations_enabled: *param_citations_enabled
      function_calling: *param_function_calling
      structured_output: *param_structured_output
      reasoning_effort:
        type: enum
        options: [low, medium, high, max]
        default: low
        ui: select
        label: Reasoning
        request_key: reasoning.effort

